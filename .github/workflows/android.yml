name: Android CI

# Builds the app on every push / PR, and publishes a GitHub Release with the APK on v* tags.
on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required so tag builds can create a Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # matches gradle/gradle-daemon-jvm.properties (toolchainVersion=21)

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read app version
        id: ver
        run: |
          V=$(grep -m1 'versionName' app/build.gradle.kts | grep -oE '"[^"]+"' | tr -d '"')
          echo "name=$V" >> "$GITHUB_OUTPUT"
          echo "App version: $V"

      - name: Decode signing keystore (if configured)
        if: env.IS_TAG == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release signing configured."
          else
            echo "No KEYSTORE_BASE64 secret set — the release tag will ship a debug-signed APK."
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ "$IS_TAG" = "true" ] && [ -n "$KEYSTORE_FILE" ]; then
            echo "Building signed release APK"
            ./gradlew assembleRelease
            SRC=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          else
            echo "Building debug APK"
            ./gradlew assembleDebug
            SRC=$(ls app/build/outputs/apk/debug/*.apk | head -n1)
          fi
          echo "Built: $SRC"
          echo "APK_SRC=$SRC" >> "$GITHUB_ENV"

      - name: Name the APK (OwnTV-v<version>)
        run: |
          VER="${{ steps.ver.outputs.name }}"
          mkdir -p dist
          if [ "$IS_TAG" = "true" ]; then
            OUT="OwnTV-v${VER}.apk"
          else
            OUT="OwnTV-v${VER}-${GITHUB_SHA::7}.apk"
          fi
          cp "$APK_SRC" "dist/$OUT"
          echo "APK_OUT=$OUT" >> "$GITHUB_ENV"
          echo "Packaged dist/$OUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_OUT }}
          path: dist/${{ env.APK_OUT }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: env.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: OwnTV ${{ github.ref_name }}
          files: dist/${{ env.APK_OUT }}
          generate_release_notes: true
